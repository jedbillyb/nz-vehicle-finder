name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://vehiclefinder.co.nz
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: server.jedbillyb.com
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /home/ubuntu/nz-vehicle-finder
            git pull origin main
            npm install
            npm run build
            sudo cp -r dist/* /var/www/html/nz-vehicle-finder/
            pm2 restart vehicle-api
